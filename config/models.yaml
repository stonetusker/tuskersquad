# TuskerSquad LLM Model Routing
# ===============================
# Only 3 agents make LLM calls. All 15 other agents are fully deterministic
# (real HTTP probes, pytest, rule-based logic — no LLM needed).
# Change any model here with no code changes required.
#
# To pull models:
#   ollama pull qwen2.5:14b
#   ollama pull phi3:mini

judge:
  model: qwen2.5:14b
  type: reasoning
  description: "Final APPROVE / REJECT / REVIEW_REQUIRED decision with reasoning"

correlator:
  model: qwen2.5:14b
  type: reasoning
  description: "3-sentence developer briefing from cross-layer root cause chains"

qa_lead:
  model: phi3:mini
  type: summary
  description: "Concise risk-level summary synthesised from all agent findings"
