version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: tuskersquad-postgres
    restart: always
    environment:
      POSTGRES_USER: tusker
      POSTGRES_PASSWORD: tusker
      POSTGRES_DB: tuskersquad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tuskersquad-network

  gitea:
    image: gitea/gitea:1.21
    container_name: tuskersquad-gitea
    restart: always
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
    networks:
      - tuskersquad-network

  langgraph-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-langgraph
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - tuskersquad-network

  integration-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-integration
    command: uvicorn services.integration_service.main:app --host 0.0.0.0 --port 8000
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
    ports:
      - "8001:8000"
    networks:
      - tuskersquad-network

  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-dashboard
    ports:
      - "8501:8501"
    networks:
      - tuskersquad-network

networks:
  tuskersquad-network:

volumes:
  postgres_data:
  gitea_data:
