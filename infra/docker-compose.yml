version: "3.9"

services:

 langgraph-api:

  build:
   context: ..
   dockerfile: infra/Dockerfile.langgraph

  container_name: tuskersquad-langgraph

  environment:
   - OLLAMA_HOST=http://host.docker.internal:11434
   - BUG_PRICE=true

  volumes:
   - ..:/app

  working_dir: /app

  command: sleep infinity

  extra_hosts:
   - "host.docker.internal:host-gateway"
