version: "3.9"


# TuskerSquad - Stonetusker Systems
# Agentic AI PR Governance Platform  v3
#
# Services
#
#  postgres            - persistent data store (port 5432)
#  gitea               - self-hosted Git + Actions  (port 3000)
#  demo-backend        - ShopFlow e-commerce test target  (port 8080)
#  langgraph-api       - 8-agent orchestration core  (port 8000)
#  integration-service - webhook receiver  (port 8001)
#  dashboard           - BFF proxy for React UI  (port 8501)
#  frontend            - React + Vite  (port 5173)
#
# Quick start (from project root):
#   cp infra/.env.example infra/.env
#   docker compose -f infra/docker-compose.yml up --build -d
#   OR just: make up


services:

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: tuskersquad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     tusker
      POSTGRES_PASSWORD: tusker
      POSTGRES_DB:       tuskersquad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - tuskersquad-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tusker -d tuskersquad -q"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s


  # Gitea self-hosted Git server.
  # gitea_init.sh starts Gitea, waits for it to be up, then creates
  # the admin user via the Gitea CLI (env vars cannot create users).
  # GITEA__webhook__ALLOWED_HOST_LIST="*" is required so Gitea can
  # deliver webhooks to other containers on the Docker network.
  gitea:
    image: gitea/gitea:1.21
    container_name: tuskersquad-gitea
    restart: unless-stopped
    command: ["/bin/sh", "/gitea_init.sh"]
    environment:
      GITEA__actions__ENABLED: "true"
      GITEA__webhook__ALLOWED_HOST_LIST: "*"
      GITEA__security__ALLOW_LOCALNETWORKS: "true"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__database__DB_TYPE: "sqlite3"
      GITEA__database__PATH: "/data/gitea/gitea.db"
      GITEA__server__ROOT_URL: "http://localhost:3000/"
      GITEA__server__HTTP_PORT: "3000"
      GITEA__log__LEVEL: "warn"
      GITEA_ADMIN_USER: "${GITEA_ADMIN_USER:-tusker}"
      GITEA_ADMIN_PASS: "${GITEA_ADMIN_PASS:-tusker1234}"
      GITEA_ADMIN_EMAIL: "${GITEA_ADMIN_EMAIL:-admin@tuskersquad.local}"
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
      - ../scripts/gitea_init.sh:/gitea_init.sh:ro
    networks:
      - tuskersquad-net
    healthcheck:
      # wget is available in the gitea:1.21 Alpine image.
      # A 200 from the root path means Gitea is ready to serve requests.
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 && echo ok || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 20
      start_period: 40s


  # One-shot container that runs after Gitea is healthy and registers the
  # webhook automatically. You no longer need to click through the Gitea UI.
  # Re-runs safely on every "make up" - the script checks before creating.
  gitea-setup:
    # Custom image built from infra/Dockerfile.gitea-setup.
    # Contains: curl (Gitea REST API calls) + python3 (base64 encoding).
    # ShopFlow demo source is BAKED INTO the image at build time so it is
    # always present regardless of whether the user runs `make up --build`
    # or plain `make up`.  Files are uploaded via the Gitea Contents API
    # (one base64-encoded curl POST per file — no git clone/push needed).
    build:
      context: ..
      dockerfile: infra/Dockerfile.gitea-setup
    container_name: tuskersquad-gitea-setup
    restart: "no"
    environment:
      GITEA_URL:            "http://tuskersquad-gitea:3000"
      GITEA_ADMIN_USER:     "${GITEA_ADMIN_USER:-tusker}"
      GITEA_ADMIN_PASS:     "${GITEA_ADMIN_PASS:-tusker1234}"
      GITEA_TOKEN:          "${GITEA_TOKEN:-}"
      GITEA_WEBHOOK_SECRET: "${GITEA_WEBHOOK_SECRET:-}"
      INTEGRATION_URL:      "http://tuskersquad-integration:8001"
      REPO_NAME:            "${GITEA_REPO:-shopflow}"
    volumes:
      - ../scripts/gitea_setup.sh:/gitea_setup.sh:ro
    command: ["sh", "/gitea_setup.sh"]
    depends_on:
      gitea:
        condition: service_healthy
    networks:
      - tuskersquad-net


  # ShopFlow demo app - legacy monolith kept for compatibility
  demo-backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.demo
    container_name: tuskersquad-demo-backend
    restart: unless-stopped
    environment:
      BUG_PRICE:    "${BUG_PRICE:-false}"
      BUG_SECURITY: "${BUG_SECURITY:-false}"
      BUG_SLOW:     "${BUG_SLOW:-false}"
    ports:
      - "8080:8080"
    networks:
      - tuskersquad-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=4)\""]
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 30s


  # ShopFlow v2 - Catalog Microservice (port 8081)
  catalog-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.catalog
    container_name: tuskersquad-catalog
    restart: unless-stopped
    environment:
      BUG_INVENTORY:  "${BUG_INVENTORY:-false}"
      BUG_PRICE_RULE: "${BUG_PRICE_RULE:-false}"
    ports:
      - "8081:8081"
    networks:
      - tuskersquad-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health', timeout=4)\""]
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 20s


  # ShopFlow v2 - Order Microservice (port 8082)
  order-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.order
    container_name: tuskersquad-order
    restart: unless-stopped
    environment:
      BUG_SLOW:          "${BUG_SLOW:-false}"
      BUG_PRICE:         "${BUG_PRICE:-false}"
      BUG_NO_ROLLBACK:   "${BUG_NO_ROLLBACK:-false}"
      CATALOG_SERVICE_URL: "http://tuskersquad-catalog:8081"
      USER_SERVICE_URL:    "http://tuskersquad-user:8083"
    ports:
      - "8082:8082"
    depends_on:
      catalog-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - tuskersquad-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8082/health', timeout=4)\""]
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 25s


  # ShopFlow v2 - User Microservice (port 8083)
  user-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.user
    container_name: tuskersquad-user
    restart: unless-stopped
    environment:
      BUG_JWT_NO_EXPIRY: "${BUG_JWT_NO_EXPIRY:-false}"
      BUG_WEAK_PASSWORD: "${BUG_WEAK_PASSWORD:-false}"
      JWT_SECRET:        "${JWT_SECRET:-shopflow-demo-secret-not-for-production}"
    ports:
      - "8083:8083"
    networks:
      - tuskersquad-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8083/health', timeout=4)\""]
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 20s


  # LangGraph API (8-agent orchestration core)
  langgraph-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-langgraph
    restart: unless-stopped
    environment:
      # LLM backend
      # Mac/Windows: host.docker.internal resolves to the host machine automatically.
      # Linux:       set OLLAMA_URL in infra/.env to your host IP, e.g.:
      #              OLLAMA_URL=http://192.168.1.100:11434
      OLLAMA_URL:            "${OLLAMA_URL:-http://host.docker.internal:11434}"
      # Database
      POSTGRES_USER:         tusker
      POSTGRES_PASSWORD:     tusker
      POSTGRES_DB:           tuskersquad
      POSTGRES_HOST:         tuskersquad-postgres
      POSTGRES_PORT:         "5432"
      # Internal service URLs
      DEMO_APP_URL:          "http://tuskersquad-demo-backend:8080"
      DEMO_FRONTEND_URL:     "http://tuskersquad-frontend:5173"
      # ShopFlow v2 microservice URLs (read by log_inspector agent)
      CATALOG_SERVICE_URL:   "http://tuskersquad-catalog:8081"
      ORDER_SERVICE_URL:     "http://tuskersquad-order:8082"
      USER_SERVICE_URL:      "http://tuskersquad-user:8083"
      # Gitea
      GITEA_URL:             "http://tuskersquad-gitea:3000"
      GITEA_TOKEN:           "${GITEA_TOKEN:-}"
      # Auto-Merge & Deploy
      AUTO_MERGE_ON_APPROVE: "${AUTO_MERGE_ON_APPROVE:-false}"
      MERGE_STYLE:           "${MERGE_STYLE:-merge}"
      DEPLOY_ON_MERGE:       "${DEPLOY_ON_MERGE:-false}"
      DEPLOY_BRANCH:         "${DEPLOY_BRANCH:-main}"
      DEPLOY_PIPELINE:       "${DEPLOY_PIPELINE:-deploy}"
      # Agent tool configuration (override in infra/.env)
      BACKEND_TEST_TOOL:     "${BACKEND_TEST_TOOL:-pytest}"
      BACKEND_TEST_DIR:      "${BACKEND_TEST_DIR:-tests/api}"
      FRONTEND_TEST_TOOL:    "${FRONTEND_TEST_TOOL:-playwright}"
      PLAYWRIGHT_TEST_DIR:   "${PLAYWRIGHT_TEST_DIR:-tests/ui}"
      SECURITY_PROBE_TOOL:   "${SECURITY_PROBE_TOOL:-httpx}"
      SRE_LOAD_TOOL:         "${SRE_LOAD_TOOL:-httpx}"
      SRE_REQUEST_COUNT:     "${SRE_REQUEST_COUNT:-10}"
      LATENCY_THRESHOLD_MS:  "${LATENCY_THRESHOLD_MS:-500}"
      # Ephemeral build/deploy environment
      WORKSPACE_ROOT:        "/tmp/tuskersquad-workspaces"
      DOCKER_NETWORK:         "tuskersquad-net"
      # IP or hostname of the Docker host — used to build the public URL
      # that human reviewers use to access the ephemeral PR container.
      # Default is "localhost" (works for local dev on the same machine).
      # Set to your server's LAN or public IP for remote deployments.
      DOCKER_HOST_IP:         "${DOCKER_HOST_IP:-localhost}"
      EPHEMERAL_PORT_RANGE_MIN: "${EPHEMERAL_PORT_RANGE_MIN:-19000}"
      EPHEMERAL_PORT_RANGE_MAX: "${EPHEMERAL_PORT_RANGE_MAX:-19999}"
      API_PREFIX:            "${API_PREFIX:-}"
      DEPLOY_HOST:           "localhost"
      HEALTH_ENDPOINT:       "/health"
      CPU_THRESHOLD:         "80"
      MEM_THRESHOLD:         "80"
      # Logging
      LOG_DIR:               "/app/logs"
    ports:
      - "8000:8000"
    volumes:
      - tuskersquad_logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock  # Required for builder/deployer agents
      - tuskersquad_workspaces:/tmp/tuskersquad-workspaces  # FIX B-5: persist workspaces across restarts
    depends_on:
      postgres:
        condition: service_healthy
      demo-backend:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - tuskersquad-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=4)\""]
      interval: 10s
      timeout: 6s
      retries: 10
      start_period: 40s
    # Linux Ollama fix
    # Uncomment the two lines below if you're on Linux and Ollama isn't reachable:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"


  # Integration Service (webhook receiver)
  integration-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-integration
    restart: unless-stopped
    command: uvicorn services.integration_service.main:app --host 0.0.0.0 --port 8001
    environment:
      LANGGRAPH_URL:          "http://tuskersquad-langgraph:8000"
      GITEA_URL:              "http://tuskersquad-gitea:3000"
      GITEA_TOKEN:            "${GITEA_TOKEN:-}"
      GITEA_WEBHOOK_SECRET:   "${GITEA_WEBHOOK_SECRET:-}"
      JIRA_URL:               "${JIRA_URL:-}"
      JIRA_TOKEN:             "${JIRA_TOKEN:-}"
      JIRA_PROJECT:           "${JIRA_PROJECT:-TUSKER}"
      SLACK_WEBHOOK_URL:      "${SLACK_WEBHOOK_URL:-}"
    ports:
      - "8001:8001"
    depends_on:
      langgraph-api:
        condition: service_healthy
      gitea:
        condition: service_healthy
    networks:
      - tuskersquad-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=4)\""]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 10s


  # Dashboard BFF proxy
  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-dashboard
    restart: unless-stopped
    command: uvicorn services.dashboard.main:app --host 0.0.0.0 --port 8501
    environment:
      LANGGRAPH_URL: "http://tuskersquad-langgraph:8000"
      GITEA_URL:     "http://tuskersquad-gitea:3000"
      GITEA_TOKEN:   "${GITEA_TOKEN:-}"
    ports:
      - "8501:8501"
    depends_on:
      langgraph-api:
        condition: service_healthy
    networks:
      - tuskersquad-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/health', timeout=4)\""]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 10s


  # React + Vite frontend
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: tuskersquad-frontend
    restart: unless-stopped
    environment:
      # Vite proxy targets (server-side only - browser uses relative paths)
      VITE_DASH_URL:        "http://dashboard:8501"
      VITE_INTEGRATION_URL: "http://integration-service:8001"
    ports:
      - "5173:5173"
    depends_on:
      dashboard:
        condition: service_healthy
      integration-service:
        condition: service_healthy
    networks:
      - tuskersquad-net


networks:
  tuskersquad-net:
    driver: bridge
    name: tuskersquad-net   # explicit name prevents docker compose from prepending the project prefix
                            # (e.g. "tuskersquad_tuskersquad-net"). Without this, deployer_agent
                            # passes "tuskersquad-net" to `docker run --network` and Docker
                            # cannot find the prefixed name → "network not found" error.


volumes:
  postgres_data:
  gitea_data:
  tuskersquad_logs:
  tuskersquad_workspaces:   # FIX B-5: named volume so PR workspaces survive container restarts
