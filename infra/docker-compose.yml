version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
# TuskerSquad — Stonetusker Systems
# Agentic AI PR Governance Platform
#
# Services
# ────────
#  postgres            — persistent data store
#  gitea               — self-hosted Git + Gitea Actions
#  demo-backend        — injectable-bug e-commerce app (test target)
#  langgraph-api       — 8-agent orchestration core
#  integration-service — webhook receiver (Gitea / GitHub / simulate)
#  dashboard           — BFF proxy for the React UI
#  frontend            — React + Vite dashboard
#
# New env vars (auto-merge & deploy)
# ───────────────────────────────────
#  AUTO_MERGE_ON_APPROVE  true|false  — merge PR after human APPROVE
#  MERGE_STYLE            merge|rebase|squash
#  DEPLOY_ON_MERGE        true|false  — trigger Gitea Actions after merge
#  DEPLOY_BRANCH          main        — branch to dispatch on
#  DEPLOY_PIPELINE        deploy      — workflow file name (without .yml)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: tuskersquad-postgres
    restart: always
    environment:
      POSTGRES_USER:     tusker
      POSTGRES_PASSWORD: tusker
      POSTGRES_DB:       tuskersquad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - tuskersquad-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tusker -d tuskersquad -q"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s


  # ── Gitea (self-hosted Git + Actions) ──────────────────────────────────────
  gitea:
    image: gitea/gitea:1.21
    container_name: tuskersquad-gitea
    restart: always
    environment:
      # Enable Gitea Actions so deploy pipelines can run
      GITEA__actions__ENABLED: "true"
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
    networks:
      - tuskersquad-network


  # ── Demo e-commerce app (test target) ──────────────────────────────────────
  demo-backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.demo
    container_name: tuskersquad-demo-backend
    environment:
      BUG_PRICE:    "${BUG_PRICE:-false}"
      BUG_SECURITY: "${BUG_SECURITY:-false}"
      BUG_SLOW:     "${BUG_SLOW:-false}"
    ports:
      - "8080:8080"
    networks:
      - tuskersquad-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=4)\""]
      interval: 10s
      timeout: 6s
      retries: 5
      start_period: 20s


  # ── LangGraph API (orchestration core) ─────────────────────────────────────
  langgraph-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-langgraph
    environment:
      # LLM
      OLLAMA_URL: "http://host.docker.internal:11434"
      # Postgres
      POSTGRES_USER:     tusker
      POSTGRES_PASSWORD: tusker
      POSTGRES_DB:       tuskersquad
      POSTGRES_HOST:     tuskersquad-postgres
      POSTGRES_PORT:     "5432"
      # Demo app
      DEMO_APP_URL:      "http://tuskersquad-demo-backend:8080"
      DEMO_FRONTEND_URL: "http://tuskersquad-frontend:5173"
      # Gitea
      GITEA_URL:   "http://tuskersquad-gitea:3000"
      GITEA_TOKEN: "${GITEA_TOKEN:-}"
      # ── Auto-Merge & Deploy ─────────────────────────────────────────────
      AUTO_MERGE_ON_APPROVE: "${AUTO_MERGE_ON_APPROVE:-false}"
      MERGE_STYLE:           "${MERGE_STYLE:-merge}"
      DEPLOY_ON_MERGE:       "${DEPLOY_ON_MERGE:-false}"
      DEPLOY_BRANCH:         "${DEPLOY_BRANCH:-main}"
      DEPLOY_PIPELINE:       "${DEPLOY_PIPELINE:-deploy}"
      # ───────────────────────────────────────────────────────────────────
      # SRE thresholds
      LATENCY_THRESHOLD_MS: "500"
      SRE_REQUEST_COUNT:    "10"
    ports:
      - "8000:8000"
    volumes:
      - tuskersquad_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      demo-backend:
        condition: service_healthy
    networks:
      - tuskersquad-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=4)\""]
      interval: 10s
      timeout: 6s
      retries: 10
      start_period: 30s


  # ── Integration Service (webhook receiver) ──────────────────────────────────
  integration-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-integration
    command: uvicorn services.integration_service.main:app --host 0.0.0.0 --port 8001
    environment:
      LANGGRAPH_URL: "http://tuskersquad-langgraph:8000"
      GITEA_URL:     "http://tuskersquad-gitea:3000"
      GITEA_TOKEN:   "${GITEA_TOKEN:-}"
      JIRA_URL:      "${JIRA_URL:-}"
      JIRA_TOKEN:    "${JIRA_TOKEN:-}"
      JIRA_PROJECT:  "${JIRA_PROJECT:-TUSKER}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
    ports:
      - "8001:8001"
    depends_on:
      langgraph-api:
        condition: service_healthy
    networks:
      - tuskersquad-network


  # ── Dashboard (BFF proxy) ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-dashboard
    command: uvicorn services.dashboard.main:app --host 0.0.0.0 --port 8501
    environment:
      LANGGRAPH_URL: "http://tuskersquad-langgraph:8000"
      GITEA_URL:     "http://tuskersquad-gitea:3000"
      GITEA_TOKEN:   "${GITEA_TOKEN:-}"
    ports:
      - "8501:8501"
    depends_on:
      langgraph-api:
        condition: service_healthy
    networks:
      - tuskersquad-network


  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: tuskersquad-frontend
    environment:
      VITE_DASH_URL:        "http://localhost:8501"
      VITE_INTEGRATION_URL: "http://localhost:8001"
    ports:
      - "5173:5173"
    depends_on:
      - dashboard
      - integration-service
    networks:
      - tuskersquad-network


networks:
  tuskersquad-network:
    driver: bridge


volumes:
  postgres_data:
  gitea_data:
  tuskersquad_logs:
