version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: tuskersquad-postgres
    restart: always
    environment:
      POSTGRES_USER: tusker
      POSTGRES_PASSWORD: tusker
      POSTGRES_DB: tuskersquad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tuskersquad-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tusker"]
      interval: 5s
      timeout: 5s
      retries: 10


  gitea:
    image: gitea/gitea:1.21
    container_name: tuskersquad-gitea
    restart: always
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
    networks:
      - tuskersquad-network


  # Demo e-commerce application (target under test)
  demo-backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-demo-backend
    command: uvicorn apps.backend.main:app --host 0.0.0.0 --port 8080
    environment:
      BUG_PRICE: "${BUG_PRICE:-false}"
      BUG_SECURITY: "${BUG_SECURITY:-false}"
      BUG_SLOW: "${BUG_SLOW:-false}"
    ports:
      - "8080:8080"
    networks:
      - tuskersquad-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5


  langgraph-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-langgraph
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      POSTGRES_USER: tusker
      POSTGRES_PASSWORD: tusker
      POSTGRES_DB: tuskersquad
      POSTGRES_HOST: tuskersquad-postgres
      POSTGRES_PORT: 5432
      # Demo app URL for real agent runners
      DEMO_APP_URL: http://tuskersquad-demo-backend:8080
      DEMO_FRONTEND_URL: http://tuskersquad-frontend:5173
      # Gitea
      GITEA_URL: http://tuskersquad-gitea:3000
      GITEA_TOKEN: "${GITEA_TOKEN:-}"
      # Latency thresholds
      LATENCY_THRESHOLD_MS: "500"
      SRE_REQUEST_COUNT: "10"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      demo-backend:
        condition: service_healthy
    networks:
      - tuskersquad-network


  integration-service:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-integration
    command: uvicorn services.integration_service.main:app --host 0.0.0.0 --port 8001
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      POSTGRES_USER: tusker
      POSTGRES_PASSWORD: tusker
      POSTGRES_DB: tuskersquad
      POSTGRES_HOST: tuskersquad-postgres
      POSTGRES_PORT: 5432
      LANGGRAPH_URL: http://langgraph-api:8000
      GITEA_URL: http://tuskersquad-gitea:3000
      GITEA_TOKEN: "${GITEA_TOKEN:-}"
      # Optional integrations
      JIRA_URL: "${JIRA_URL:-}"
      JIRA_TOKEN: "${JIRA_TOKEN:-}"
      JIRA_PROJECT: "${JIRA_PROJECT:-TUSKER}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      langgraph-api:
        condition: service_started
    networks:
      - tuskersquad-network


  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile.langgraph
    container_name: tuskersquad-dashboard
    command: uvicorn services.dashboard.main:app --host 0.0.0.0 --port 8501
    environment:
      POSTGRES_USER: tusker
      POSTGRES_PASSWORD: tusker
      POSTGRES_DB: tuskersquad
      POSTGRES_HOST: tuskersquad-postgres
      POSTGRES_PORT: 5432
      LANGGRAPH_URL: http://langgraph-api:8000
      GITEA_URL: http://tuskersquad-gitea:3000
      GITEA_TOKEN: "${GITEA_TOKEN:-}"
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      langgraph-api:
        condition: service_started
    networks:
      - tuskersquad-network


  frontend:
    image: node:20
    container_name: tuskersquad-frontend
    working_dir: /app/apps/frontend
    volumes:
      - ..:/app:cached
      - frontend_node_modules:/app/apps/frontend/node_modules
    environment:
      VITE_DASH_URL: http://localhost:8501
      VITE_INTEGRATION_URL: http://localhost:8001
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      CI: '1'
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - dashboard
    networks:
      - tuskersquad-network


networks:
  tuskersquad-network:


volumes:
  postgres_data:
  gitea_data:
  frontend_node_modules:
